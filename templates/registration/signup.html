{% extends "quotes/base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<section class="mx-auto max-w-md">
  <h1 class="mb-4 text-2xl font-semibold">Create account</h1>
  <form method="post" class="space-y-4 rounded-md border border-slate-200 bg-white p-5 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button-primary w-full justify-center" type="submit"><i data-lucide="user-plus" class="h-4 w-4"></i> Create account</button>
  </form>
</section>
{% endblock %}
