{% extends "quotes/base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<section class="mx-auto max-w-md">
  <h1 class="mb-4 text-2xl font-semibold">Log in</h1>
  <form method="post" class="space-y-4 rounded-md border border-slate-200 bg-white p-5 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button-primary w-full justify-center" type="submit"><i data-lucide="log-in" class="h-4 w-4"></i> Log in</button>
    <a class="block text-center text-sm text-cyan-700" href="{% url 'password_reset' %}">Reset password</a>
  </form>
</section>
{% endblock %}
