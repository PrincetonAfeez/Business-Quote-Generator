{% load quote_extras %}
<section class="rounded-md border border-slate-200 bg-white p-4 shadow-sm">
  <div class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <p class="text-sm text-slate-500">Quote</p>
      <h1 class="text-3xl font-semibold">{{ quote.number }}</h1>
      <p class="mt-1 text-sm text-slate-600">{{ quote.client }} · {{ quote.issue_date }} to {{ quote.expiry_date }}</p>
    </div>
    <span class="rounded-full px-2 py-1 text-xs font-medium {{ quote.status|status_badge }}">{{ quote.get_status_display }}</span>
  </div>
  <details>
    <summary class="cursor-pointer text-sm font-medium text-cyan-700">Edit header</summary>
    {% include "quotes/partials/_quote_header_form.html" %}
  </details>
</section>
