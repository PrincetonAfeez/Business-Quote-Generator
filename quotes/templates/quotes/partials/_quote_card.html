{% load quote_extras %}
<article class="rounded-md border border-slate-200 bg-white p-4 text-sm shadow-sm">
  <div class="flex items-start justify-between gap-2">
    <a class="font-semibold text-cyan-700" href="{% url 'quotes:quote_detail' quote.pk %}">{{ quote.number }}</a>
    <span class="rounded-full px-2 py-1 text-xs font-medium {{ quote.status|status_badge }}">{{ quote.get_status_display }}</span>
  </div>
  <p class="mt-2 text-slate-600">{{ quote.client }}</p>
  <p class="mt-1 font-medium">{{ quote.total|currency }}</p>
</article>
