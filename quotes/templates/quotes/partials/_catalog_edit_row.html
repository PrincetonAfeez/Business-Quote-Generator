{% load quote_extras %}
<tr id="catalog-{{ item.pk }}">
  <td colspan="3" class="px-4 py-4">
    <form class="grid gap-3 md:grid-cols-2" method="post"
          hx-post="{% url 'quotes:catalog_update' item.pk %}"
          hx-target="#catalog-{{ item.pk }}"
          hx-swap="outerHTML">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex flex-wrap gap-2 md:col-span-2">
        <button class="button-primary" type="submit"><i data-lucide="save" class="h-4 w-4"></i> Save</button>
        <button class="button-secondary" type="button"
                hx-get="{% url 'quotes:catalog_row' item.pk %}"
                hx-target="#catalog-{{ item.pk }}"
                hx-swap="outerHTML">Cancel</button>
      </div>
    </form>
  </td>
</tr>
