{% if quote.notes or quote.terms %}
<section class="rounded-md border border-slate-200 bg-white p-4 shadow-sm">
  <h2 class="mb-3 text-lg font-semibold">Notes &amp; terms</h2>
  <div class="grid gap-4 text-sm sm:grid-cols-2">
    {% if quote.notes %}
      <div>
        <h3 class="mb-1 font-medium text-slate-700">Notes</h3>
        <div class="whitespace-pre-wrap text-slate-600">{{ quote.notes }}</div>
      </div>
    {% endif %}
    {% if quote.terms %}
      <div>
        <h3 class="mb-1 font-medium text-slate-700">Terms</h3>
        <div class="whitespace-pre-wrap text-slate-600">{{ quote.terms }}</div>
      </div>
    {% endif %}
  </div>
</section>
{% endif %}
