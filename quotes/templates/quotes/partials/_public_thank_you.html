{% if transition_error %}
  <div id="public-actions" class="rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800">
    {{ transition_error }}
  </div>
{% else %}
  <div id="public-actions" class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800">
    Thank you. This quote is now {{ quote.get_status_display|lower }}.
  </div>
{% endif %}
