<tr id="client-{{ client.pk }}">
  <td class="px-4 py-3">
    <p class="font-medium">{{ client.name }}</p>
    <p class="text-xs text-slate-500">{{ client.company }}</p>
  </td>
  <td class="px-4 py-3">{{ client.email }}</td>
  <td class="px-4 py-3">{{ client.phone }}</td>
  <td class="px-4 py-3 text-right">
    <button class="button-secondary" type="button"
            hx-get="{% url 'quotes:client_update' client.pk %}"
            hx-target="#client-{{ client.pk }}"
            hx-swap="outerHTML">
      <i data-lucide="pencil" class="h-4 w-4" aria-hidden="true"></i> Edit
    </button>
    <form class="inline" method="post" action="{% url 'quotes:client_delete' client.pk %}" hx-post="{% url 'quotes:client_delete' client.pk %}" hx-target="#client-{{ client.pk }}" hx-swap="outerHTML" hx-confirm="Delete client {{ client }}?">
      {% csrf_token %}
      <button class="icon-button" type="submit" aria-label="Delete client {{ client.name }}"><i data-lucide="trash-2" class="h-4 w-4" aria-hidden="true"></i></button>
    </form>
  </td>
</tr>
