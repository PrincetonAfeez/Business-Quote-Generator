{% extends "quotes/base.html" %}
{% block title %}Clients{% endblock %}
{% block content %}
<div class="mb-6 flex flex-wrap items-center justify-between gap-3">
  <h1 class="text-2xl font-semibold">Clients</h1>
  <a href="{% url 'quotes:client_create' %}" class="button-primary"><i data-lucide="plus" class="h-4 w-4"></i> New client</a>
</div>
<div class="rounded-md border border-slate-200 bg-white shadow-sm">
  <div class="border-b border-slate-200 p-3">
    <input class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" type="search" name="q" placeholder="Search clients"
           hx-get="{% url 'quotes:client_list' %}" hx-target="#client-table" hx-trigger="keyup changed delay:300ms, search">
  </div>
  <div id="client-table">{% include "quotes/partials/_client_table.html" %}</div>
</div>
{% endblock %}
