{% extends "quotes/base.html" %}
{% block title %}Catalog{% endblock %}
{% block content %}
<div class="mb-6 flex flex-wrap items-center justify-between gap-3">
  <h1 class="text-2xl font-semibold">Catalog</h1>
  <a href="{% url 'quotes:catalog_create' %}" class="button-primary"><i data-lucide="plus" class="h-4 w-4"></i> New item</a>
</div>
<div class="rounded-md border border-slate-200 bg-white shadow-sm">
  <div class="border-b border-slate-200 p-3">
    <input class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" type="search" name="q" placeholder="Search catalog"
           hx-get="{% url 'quotes:catalog_list' %}" hx-target="#catalog-table" hx-trigger="keyup changed delay:300ms, search" hx-push-url="true">
  </div>
  <div id="catalog-table">{% include "quotes/partials/_catalog_table.html" %}</div>
</div>
{% endblock %}
