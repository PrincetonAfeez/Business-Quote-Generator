{% extends "quotes/base.html" %}
{% block title %}New quote{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl">
  <h1 class="mb-4 text-2xl font-semibold">New quote</h1>
  <form method="post" class="space-y-4 rounded-md border border-slate-200 bg-white p-5 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button-primary" type="submit"><i data-lucide="file-plus" class="h-4 w-4"></i> Create quote</button>
  </form>
</section>
{% endblock %}
