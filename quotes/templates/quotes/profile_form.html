{% extends "quotes/base.html" %}
{% block title %}Company profile{% endblock %}
{% block content %}
<section class="mx-auto max-w-2xl">
  <h1 class="mb-4 text-2xl font-semibold">Company profile</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4 rounded-md border border-slate-200 bg-white p-5 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button-primary" type="submit"><i data-lucide="save" class="h-4 w-4"></i> Save profile</button>
  </form>
</section>
{% endblock %}
